<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator | Square Format</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="brand">
                <span>✨ Scientific Calculator ✨</span>
                <small>Scientific Calculator</small>
            </div>
            
            <div class="display">
                <div class="previous-operand" id="previousOperand"></div>
                <div class="current-operand" id="currentOperand">0</div>
            </div>
            <p>xjnzdfuhefiewjoskka</p>
            <div class="buttons">
                <!-- Row 1: Scientific functions -->
                <button class="btn scientific" data-action="square">x²</button>
                <button class="btn scientific" data-action="sqrt">√x</button>
                <button class="btn scientific" data-action="cube">x³</button>
                <button class="btn scientific" data-action="cbrt">∛x</button>
                
                <!-- Row 2: Memory & Clear -->
                <button class="btn memory" data-action="clear">AC</button>
                <button class="btn memory" data-action="delete">DEL</button>
                <button class="btn memory" data-action="percent">%</button>
                <button class="btn operator" data-action="divide">÷</button>
                
                <!-- Row 3: Numbers 7-9 -->
                <button class="btn number" data-number="7">7</button>
                <button class="btn number" data-number="8">8</button>
                <button class="btn number" data-number="9">9</button>
                <button class="btn operator" data-action="multiply">×</button>
                
                <!-- Row 4: Numbers 4-6 -->
                <button class="btn number" data-number="4">4</button>
                <button class="btn number" data-number="5">5</button>
                <button class="btn number" data-number="6">6</button>
                <button class="btn operator" data-action="subtract">-</button>
                
                <!-- Row 5: Numbers 1-3 -->
                <button class="btn number" data-number="1">1</button>
                <button class="btn number" data-number="2">2</button>
                <button class="btn number" data-number="3">3</button>
                <button class="btn operator" data-action="add">+</button>
                
                <!-- Row 6: Zero, decimal, equals -->
                <button class="btn number zero" data-number="0">0</button>
                <button class="btn number" data-number=".">.</button>
                <button class="btn equals" data-action="equals">=</button>
                <button class="btn scientific" data-action="pi">π</button>
            </div>
            
            <div class="status-bar">
                <span>📐 Ready</span>
                <span>🎯 Real-time</span>
                <span>wefkhu</span>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
